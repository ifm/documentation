image: python:3.9

stages:
  - build

build documentation:
  stage: build
  tags:
    - shared_docker
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
  before_script:
    - pip install -r requirements.txt
    - git submodule update --init --recursive
  script:
    - sphinx-build -b html . ${CI_PROJECT_DIR}/public
    - cp -r ${CI_PROJECT_DIR}/ifm3d-docs/cpp_api ${CI_PROJECT_DIR}/public/
    - git config --global user.email "support.robotics@ifm.com"
    - git config --global user.name "ifm-csr"
    - git clone -b gh_pages https://${DEVELOPERPORTAL}:x-oauth-basic@github.com/ifm/developerportal.git repo
    - cd repo
    - mkdir ./public
    - cp -r ${CI_PROJECT_DIR}/public/* ./public
    - git add -A
    - git commit -m "build sphinx docs" --allow-empty
    - git push
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_REF_NAME != $CI_DEFAULT_BRANCH
